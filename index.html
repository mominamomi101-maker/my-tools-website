<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader Pro - All Platforms</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Poppins', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%); }
        .glass { backdrop-filter: blur(20px); background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); }
        .btn-primary { background: linear-gradient(45deg, #ff6b6b, #4ecdc4); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(255,107,107,0.4); }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen gradient-bg text-white p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        
        <!-- Header -->
        <div class="text-center mb-12 fade-in">
            <div class="flex items-center justify-center gap-4 mb-6">
                <div class="w-20 h-20 bg-white/20 rounded-2xl flex items-center justify-center backdrop-blur-xl">
                    <i class="fas fa-download text-3xl text-white"></i>
                </div>
                <div>
                    <h1 class="text-4xl md:text-5xl font-bold bg-gradient-to-r from-white to-gray-200 bg-clip-text text-transparent">
                        VideoGrab Pro
                    </h1>
                    <p class="text-xl opacity-90 mt-2">Download from YouTube, Instagram, TikTok & 100+ sites</p>
                </div>
            </div>
        </div>

        <!-- Input Section -->
        <div class="glass rounded-3xl p-8 md:p-12 mb-8 fade-in">
            <div class="flex flex-col lg:flex-row gap-4">
                <input 
                    id="videoUrl" 
                    type="url" 
                    placeholder="📎 Paste YouTube, Instagram, TikTok link here..." 
                    class="flex-1 p-5 rounded-2xl text-lg border-2 border-white/30 focus:border-blue-400 focus:outline-none bg-white/10 backdrop-blur-xl"
                >
                <button id="analyzeBtn" class="btn-primary px-12 py-5 rounded-2xl text-xl font-semibold flex items-center gap-3">
                    <i class="fas fa-magic"></i> Analyze
                </button>
            </div>
            
            <!-- Platform Detection -->
            <div id="platformInfo" class="mt-6 p-4 rounded-2xl bg-white/10 text-center hidden">
                <i class="fas fa-check-circle text-2xl text-green-400 mr-3"></i>
                <span id="platformName" class="font-semibold"></span>
            </div>
        </div>

        <!-- Progress -->
        <div id="progressSection" class="glass rounded-3xl p-8 mb-8 hidden fade-in">
            <div class="text-center">
                <div class="w-full bg-white/20 rounded-full h-4 mb-4 overflow-hidden">
                    <div id="progressBar" class="btn-primary h-full rounded-full transition-all duration-1000 w-0" style="width: 0%"></div>
                </div>
                <div class="text-2xl font-bold" id="progressText">0%</div>
                <p class="opacity-80 mt-2" id="progressStatus">Analyzing video...</p>
            </div>
        </div>

        <!-- Results -->
        <div id="results" class="space-y-6 hidden"></div>

        <!-- Supported Platforms -->
        <div class="glass rounded-3xl p-8 mt-12 fade-in">
            <h3 class="text-2xl font-bold text-center mb-8 flex items-center justify-center gap-3">
                <i class="fas fa-globe"></i> Supported Platforms
            </h3>
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 text-center">
                <div class="p-4 rounded-xl hover:bg-white/20 transition-all cursor-pointer">
                    <i class="fab fa-youtube text-3xl text-red-500 mb-2"></i>
                    <div>YouTube</div>
                </div>
                <div class="p-4 rounded-xl hover:bg-white/20 transition-all cursor-pointer">
                    <i class="fab fa-instagram text-3xl text-pink-500 mb-2"></i>
                    <div>Instagram</div>
                </div>
                <div class="p-4 rounded-xl hover:bg-white/20 transition-all cursor-pointer">
                    <i class="fab fa-tiktok text-3xl text-black mb-2"></i>
                    <div>TikTok</div>
                </div>
                <div class="p-4 rounded-xl hover:bg-white/20 transition-all cursor-pointer">
                    <i class="fab fa-facebook text-3xl text-blue-600 mb-2"></i>
                    <div>Facebook</div>
                </div>
                <div class="p-4 rounded-xl hover:bg-white/20 transition-all cursor-pointer">
                    <i class="fab fa-twitter text-3xl text-sky-500 mb-2"></i>
                    <div>Twitter/X</div>
                </div>
                <div class="p-4 rounded-xl hover:bg-white/20 transition-all cursor-pointer">
                    <i class="fab fa-whatsapp text-3xl text-green-500 mb-2"></i>
                    <div>Status</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        class VideoDownloader {
            constructor() {
                this.urlInput = document.getElementById('videoUrl');
                this.analyzeBtn = document.getElementById('analyzeBtn');
                this.platformInfo = document.getElementById('platformInfo');
                this.platformName = document.getElementById('platformName');
                this.progressSection = document.getElementById('progressSection');
                this.progressBar = document.getElementById('progressBar');
                this.progressText = document.getElementById('progressText');
                this.progressStatus = document.getElementById('progressStatus');
                this.results = document.getElementById('results');

                this.platforms = {
                    youtube: { regex: /(youtube\.com|youtu\.be|youtube-nocookie\.com)/i, name: 'YouTube', icon: 'fab fa-youtube text-red-500' },
                    instagram: { regex: /instagram\.com/i, name: 'Instagram', icon: 'fab fa-instagram text-pink-500' },
                    tiktok: { regex: /tiktok\.com/i, name: 'TikTok', icon: 'fab fa-tiktok text-black' },
                    facebook: { regex: /facebook\.com|fb\.watch/i, name: 'Facebook', icon: 'fab fa-facebook text-blue-600' },
                    twitter: { regex: /(twitter\.com|x\.com)/i, name: 'Twitter/X', icon: 'fab fa-twitter text-sky-500' },
                };

                this.init();
            }

            init() {
                this.analyzeBtn.addEventListener('click', () => this.analyzeVideo());
                this.urlInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.analyzeVideo();
                });
                this.urlInput.addEventListener('input', () => this.detectPlatform());
            }

            detectPlatform() {
                const url = this.urlInput.value;
                const platform = Object.values(this.platforms).find(p => p.regex.test(url));
                
                if (platform) {
                    this.platformInfo.classList.remove('hidden');
                    this.platformName.textContent = platform.name;
                    this.platformName.innerHTML += ` <i class="${platform.icon}"></i>`;
                } else {
                    this.platformInfo.classList.add('hidden');
                }
            }

            async analyzeVideo() {
                const url = this.urlInput.value.trim();
                if (!url) {
                    this.showError('Please enter a video URL first!');
                    return;
                }

                this.showProgress(10, '🔍 Detecting platform...');
                await this.sleep(800);

                this.showProgress(30, '📥 Fetching video info...');
                const videoData = await this.getVideoData(url);
                
                this.showProgress(70, '🎨 Preparing download links...');
                await this.sleep(1200);

                this.showResults(videoData);
                this.showProgress(100, '✅ Ready to download!');
                await this.sleep(500);
                this.hideProgress();
            }

            async getVideoData(url) {
                // Real APIs for different platforms
                const platform = Object.entries(this.platforms).find(([key, p]) => p.regex.test(url));
                
                if (platform?.[0] === 'youtube') {
                    return await this.getYouTubeData(url);
                } else if (platform?.[0] === 'instagram') {
                    return await this.getInstagramData(url);
                }
                
                // Default mock data for demo (replace with real APIs)
                return {
                    title: "Amazing Video Title",
                    thumbnail: "https://img.youtube.com/vi/dQw4w9WgXcQ/mqdefault.jpg",
                    duration: "3:45",
                    author: "Creator Name",
                    quality: "HD",
                    sizes: ["15.2 MB", "8.7 MB", "4.2 MB"],
                    downloadLinks: [
                        { quality: "1080p", size: "15.2 MB", url: "#", icon: "fas fa-hd" },
                        { quality: "720p", size: "8.7 MB", url: "#", icon: "fas fa-video" },
                        { quality: "480p", size: "4.2 MB", url: "#", icon: "fas fa-mobile-alt" }
                    ]
                };
            }

            async getYouTubeData(url) {
                try {
                    const videoId = this.extractYouTubeId(url);
                    const response = await fetch(`https://noembed.com/embed?dataType=json&url=${encodeURIComponent(url)}`);
                    const data = await response.json();
                    
                    return {
                        title: data.title || "YouTube Video",
                        thumbnail: data.thumbnail_url || `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`,
                        duration: "Live",
                        author: data.author_name || "YouTube",
                        quality: "HD",
                        sizes: ["Varies", "High Quality", "Standard"],
                        downloadLinks: [
                            { quality: "1080p", size: "High", url: `https://www.y2mate.com/youtube/${videoId}`, icon: "fas fa-hd" },
                            { quality: "720p", size: "Medium", url: `https://ssyoutube.com/${videoId}`, icon: "fas fa-video" },
                            { quality: "480p", size: "Low", url: `https://y2mate.is/${videoId}`, icon: "fas fa-mobile-alt" }
                        ]
                    };
                } catch {
                    return this.getMockData();
                }
            }

            extractYouTubeId(url) {
                const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
                const match = url.match(regExp);
                return (match && match[2].length === 11) ? match[2] : null;
            }

            async getInstagramData(url) {
                // Instagram API would go here
                return this.getMockData('Instagram Reel');
            }

            getMockData(platform = "Video") {
                return {
                    title: `${platform} - Awesome Content`,
                    thumbnail: "https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?w=400&h=300&fit=crop",
                    duration: "2:30",
                    author: "Content Creator",
                    quality: "HD",
                    sizes: ["12.5 MB", "7.8 MB", "3.9 MB"],
                    downloadLinks: [
                        { quality: "HD", size: "12.5 MB", url: "#", icon: "fas fa-hd" },
                        { quality: "SD", size: "7.8 MB", url: "#", icon: "fas fa-video" },
                        { quality: "Low", size: "3.9 MB", url: "#", icon: "fas fa-mobile-alt" }
                    ]
                };
            }

            showProgress(percent, status) {
                this.progressSection.classList.remove('hidden');
                this.progressBar.style.width = percent + '%';
                this.progressText.textContent = percent + '%';
                this.progressStatus.textContent = status;
            }

            hideProgress() {
                setTimeout(() => {
                    this.progressSection.classList.add('hidden');
                }, 2000);
            }

            showResults(data) {
                this.results.classList.remove('hidden');
                this.results.innerHTML = `
                    <div class="glass rounded-3xl p-8 fade-in">
                        <div class="flex flex-col lg:flex-row gap-8 items-center">
                            <img src="${data.thumbnail}" alt="Video" class="w-64 h-48 object-cover rounded-2xl shadow-2xl flex-shrink-0">
                            <div class="flex-1">
                                <h2 class="text-3xl font-bold mb-4 line-clamp-2">${data.title}</h2>
                                <div class="grid grid-cols-2 gap-4 mb-6">
                                    <div class="p-4 rounded-xl bg-white/10">
                                        <i class="fas fa-clock text-xl mb-1"></i>
                                        <div>${data.duration}</div>
                                    </div>
                                    <div class="p-4 rounded-xl bg-white/10">
                                        <i class="fas fa-user text-xl mb-1"></i>
                                        <div>${data.author}</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="mt-8">
                            <h3 class="text-2xl font-bold mb-6 flex items-center gap-3">
                                <i class="fas fa-download"></i> Download Options
                            </h3>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                ${data.downloadLinks.map(link => `
                                    <a href="${link.url}" target="_blank" class="btn-primary p-6 rounded-2xl text-center group hover:scale-105 transition-all flex flex-col items-center gap-2">
                                        <i class="${link.icon} text-2xl group-hover:rotate-12 transition-all"></i>
                                        <div class="font-bold text-lg">${link.quality}</div>
                                        <div class="opacity-90 text-sm">${link.size}</div>
                                    </a>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            }

            showError(message) {
                this.results.classList.remove('hidden');
                this.results.innerHTML = `
                    <div class="glass rounded-3xl p-12 text-center fade-in">
                        <i class="fas fa-exclamation-triangle text-6xl text-yellow-400 mb-6"></i>
                        <h2 class="text-3xl font-bold mb-4 text-yellow-300">Oops!</h2>
                        <p class="text-xl opacity-90 mb-8">${message}</p>
                        <button onclick="location.reload()" class="btn-primary px-12 py-4 rounded-2xl text-xl font-semibold">
                            🔄 Try Again
                        </button>
                    </div>
                `;
            }

            sleep(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            new VideoDownloader();
        });
    </script>
</body>
</html>
