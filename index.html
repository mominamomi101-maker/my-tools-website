    <script>
        const urlInput = document.getElementById('videoUrl');
        const processBtn = document.getElementById('processBtn');
        const loadingDiv = document.getElementById('loading');
        const errorMsg = document.getElementById('errorMsg');
        const resultBox = document.getElementById('resultBox');
        const videoPreview = document.getElementById('videoPreview');
        const finalDownloadBtn = document.getElementById('finalDownloadBtn');
        const speedSlider = document.getElementById('speedSlider');
        const speedValue = document.getElementById('speedValue');
        const removeWatermark = document.getElementById('removeWatermark');
        const qualitySelect = document.getElementById('quality');

        let currentPlatform = 'youtube';
        let currentVideoBlob = null;

        // Platform selection
        document.querySelectorAll('.platform-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.platform-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentPlatform = btn.dataset.platform;
            });
        });

        // Speed slider
        speedSlider.addEventListener('input', () => {
            const speed = parseFloat(speedSlider.value);
            speedValue.textContent = speed.toFixed(2) + 'x';
            if (videoPreview) videoPreview.playbackRate = speed;
        });

        // Process video using API
        processBtn.addEventListener('click', async () => {
            const url = urlInput.value.trim();
            if (!url) {
                showError('Please enter a video URL 💕');
                return;
            }

            showLoading();
            hideError();

            try {
                let apiUrl = '';
                let watermark = removeWatermark.checked ? 'yes' : 'no';
                
                if (currentPlatform === 'youtube') {
                    apiUrl = `https://ytdlapi.com/api?url=${encodeURIComponent(url)}&quality=${qualitySelect.value}`;
                } else if (currentPlatform === 'tiktok') {
                    apiUrl = `https://tiktokdl.com/api?url=${encodeURIComponent(url)}&watermark=${watermark}`;
                } else if (currentPlatform === 'instagram') {
                    apiUrl = `https://instaapi.com/api?url=${encodeURIComponent(url)}`;
                }

                const response = await fetch(apiUrl);
                const data = await response.json();
                
                if (data.success && data.video_url) {
                    const videoResponse = await fetch(data.video_url);
                    currentVideoBlob = await videoResponse.blob();
                    const videoUrl = URL.createObjectURL(currentVideoBlob);
                    
                    videoPreview.src = videoUrl;
                    hideLoading();
                    resultBox.style.display = 'block';
                } else {
                    throw new Error('Failed to fetch video');
                }
            } catch (error) {
                hideLoading();
                showError('Failed to process. Please try again or use another URL. 💕');
                console.error(error);
            }
        });

        finalDownloadBtn.addEventListener('click', () => {
            if (currentVideoBlob) {
                const url = URL.createObjectURL(currentVideoBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `video_${currentPlatform}_${qualitySelect.value}.mp4`;
                a.click();
                URL.revokeObjectURL(url);
            }
        });

        function showLoading() {
            loadingDiv.style.display = 'block';
            processBtn.disabled = true;
        }

        function hideLoading() {
            loadingDiv.style.display = 'none';
            processBtn.disabled = false;
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
            setTimeout(() => errorMsg.style.display = 'none', 5000);
        }

        function hideError() {
            errorMsg.style.display = 'none';
        }
    </script>
