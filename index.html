<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remove BG & Retouch - Free Image Editor</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1><i class="fas fa-magic"></i> RemoveBG & Retouch</h1>
            <p>Free AI-powered background remover & image editor</p>
        </header>

        <!-- Upload Section -->
        <div class="upload-section">
            <div class="upload-area" id="uploadArea">
                <i class="fas fa-cloud-upload-alt"></i>
                <h3>Drag & Drop or Click to Upload Image</h3>
                <p>Supports JPG, PNG, WebP (Max 5MB)</p>
                <input type="file" id="imageInput" accept="image/*" hidden>
                <button class="upload-btn" onclick="document.getElementById('imageInput').click()">
                    <i class="fas fa-upload"></i> Choose Image
                </button>
            </div>
        </div>

        <!-- Editor Section -->
        <div class="editor-section" id="editorSection" style="display: none;">
            <div class="editor-tools">
                <div class="tool-group">
                    <button class="tool-btn active" data-tool="remove-bg">
                        <i class="fas fa-cut"></i> Remove BG
                    </button>
                    <button class="tool-btn" data-tool="retouch">
                        <i class="fas fa-paint-brush"></i> Retouch
                    </button>
                    <button class="tool-btn" data-tool="adjust">
                        <i class="fas fa-sliders-h"></i> Adjust
                    </button>
                </div>
            </div>

            <div class="canvas-container">
                <canvas id="editorCanvas"></canvas>
                <div class="canvas-overlay" id="canvasOverlay"></div>
            </div>

            <div class="control-panel">
                <div class="controls" id="removeBgControls">
                    <h4>Background Remover</h4>
                    <div class="slider-group">
                        <label>Edge Precision: <span id="edgePrecisionValue">50</span>%</label>
                        <input type="range" id="edgePrecision" min="0" max="100" value="50">
                    </div>
                    <button class="apply-btn" onclick="applyRemoveBG()">
                        <i class="fas fa-magic"></i> Remove Background
                    </button>
                </div>

                <div class="controls" id="retouchControls" style="display: none;">
                    <h4>Retouch Tools</h4>
                    <div class="slider-group">
                        <label>Brush Size: <span id="brushSizeValue">20</span>px</label>
                        <input type="range" id="brushSize" min="5" max="50" value="20">
                    </div>
                    <div class="slider-group">
                        <label>Opacity: <span id="opacityValue">100</span>%</label>
                        <input type="range" id="opacity" min="0" max="100" value="100">
                    </div>
                    <button class="apply-btn" onclick="applyRetouch()">
                        <i class="fas fa-paint-brush"></i> Apply Retouch
                    </button>
                </div>

                <div class="controls" id="adjustControls" style="display: none;">
                    <h4>Image Adjustments</h4>
                    <div class="slider-group">
                        <label>Brightness: <span id="brightnessValue">0</span></label>
                        <input type="range" id="brightness" min="-100" max="100" value="0">
                    </div>
                    <div class="slider-group">
                        <label>Contrast: <span id="contrastValue">0</span></label>
                        <input type="range" id="contrast" min="-100" max="100" value="0">
                    </div>
                    <div class="slider-group">
                        <label>Saturation: <span id="saturationValue">0</span></label>
                        <input type="range" id="saturation" min="-100" max="100" value="0">
                    </div>
                </div>
            </div>
        </div>

        <!-- Download Section -->
        <div class="download-section" id="downloadSection" style="display: none;">
            <h3><i class="fas fa-check-circle"></i> Ready to Download!</h3>
            <div class="preview-container">
                <canvas id="previewCanvas"></canvas>
            </div>
            <div class="download-buttons">
                <button class="download-btn primary" onclick="downloadImage('png')">
                    <i class="fas fa-download"></i> Download PNG
                </button>
                <button class="download-btn" onclick="downloadImage('jpg')">
                    <i class="fas fa-download"></i> Download JPG
                </button>
                <button class="download-btn secondary" onclick="newImage()">
                    <i class="fas fa-plus"></i> Edit New Image
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="bg-remover.js"></script>
</body>
</html>
