            { name: "Simple Mandala", category: "mandala", img: "https://www.supercoloring.com/sites/default/files/styles/coloring_medium/public/coloring/2024/01/simple-mandala-coloring-page.png", pdf: "https://www.supercoloring.com/coloring-pages/simple-mandala/download", popular: false, new: false },

            { name: "Baby Bunny", category: "animals", img: "https://www.supercoloring.com/sites/default/files/styles/coloring_medium/public/coloring/2023/12/bunny-coloring-page.png", pdf: "https://www.supercoloring.com/coloring-pages/bunny/download", popular: false, new: true },

            { name: "Colorful Butterfly", category: "butterfly", img: "https://www.supercoloring.com/sites/default/files/styles/coloring_medium/public/coloring/2023/12/colorful-butterfly-coloring-page.png", pdf: "https://www.supercoloring.com/coloring-pages/colorful-butterfly/download", popular: false, new: true },

            { name: "Teddy Bear", category: "animals", img: "https://www.supercoloring.com/sites/default/files/styles/coloring_medium/public/coloring/2023/11/teddy-bear-coloring-page.png", pdf: "https://www.supercoloring.com/coloring-pages/teddy-bear/download", popular: false, new: true }
        ];

        let currentCategory = "all";
        let currentSearch = "";

        function renderPopular() {
            const popularItems = coloringData.filter(item => item.popular === true);
            document.getElementById("popularGrid").innerHTML = popularItems.map(item => `
                <div class="popular-card" onclick="openPDF('${item.pdf}')">
                    ${item.new ? '<span class="new-badge">New</span>' : ''}
                    <img src="${item.img}" alt="${item.name}"><div class="info"><h3>${item.name}</h3></div>
                </div>
            `).join("");
        }

        function renderColoringPages() {
            let filtered = coloringData;
            if (currentCategory !== "all") filtered = filtered.filter(item => item.category === currentCategory);
            if (currentSearch !== "") filtered = filtered.filter(item => item.name.toLowerCase().includes(currentSearch.toLowerCase()));
            document.getElementById("coloringGrid").innerHTML = filtered.map(item => `
                <div class="coloring-card">
                    ${item.new ? '<span class="new-badge" style="position:absolute; top:5px; right:5px; background:#ff5722;">New</span>' : ''}
                    <img src="${item.img}" alt="${item.name}" loading="lazy">
                    <div class="info"><h3>${item.name}</h3><button onclick="openPDF('${item.pdf}')">📥 Download PDF</button></div>
                </div>
            `).join("");
        }

        function openPDF(pdfUrl) {
            document.getElementById("pdfFrame").src = pdfUrl;
            document.getElementById("pdfModal").style.display = "flex";
        }

        function closeModal() {
            document.getElementById("pdfFrame").src = "";
            document.getElementById("pdfModal").style.display = "none";
        }

        function toggleDarkMode() { document.body.classList.toggle("dark-mode"); }
        function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }

        window.onscroll = function() {
            document.getElementById("backToTop").style.display = (document.body.scrollTop > 200 || document.documentElement.scrollTop > 200) ? "block" : "none";
        };

        document.querySelectorAll(".cat-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                currentCategory = btn.dataset.cat;
                renderColoringPages();
            });
        });

        document.getElementById("searchInput").addEventListener("input", (e) => { currentSearch = e.target.value; renderColoringPages(); });
        renderPopular(); renderColoringPages();
    </script>
