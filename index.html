<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Magic Studio - Free AI Image Generator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <nav class="navbar">
            <div class="nav-brand">
                <i class="fas fa-magic"></i>
                <span>AI Magic Studio</span>
            </div>
            <div class="nav-menu">
                <a href="#" class="nav-link active">Home</a>
                <a href="#" class="nav-link">Pricing</a>
                <a href="#" class="nav-link">API</a>
                <button class="login-btn">Login</button>
            </div>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Create Stunning Images with AI</h1>
            <p>Generate beautiful, high-quality images from text in seconds. Free to use!</p>
            <div class="hero-form">
                <input type="text" id="promptInput" placeholder="e.g. A futuristic city at sunset, cyberpunk style">
                <select id="styleSelect">
                    <option value="realistic">Realistic</option>
                    <option value="cartoon">Cartoon</option>
                    <option value="oil-painting">Oil Painting</option>
                    <option value="digital-art">Digital Art</option>
                </select>
                <button id="generateBtn" class="generate-btn">
                    <span>Generate Image</span>
                    <div class="loader" id="loader"></div>
                </button>
            </div>
        </div>
    </section>

    <!-- Gallery -->
    <section class="gallery" id="gallery">
        <h2>Recent Creations</h2>
        <div class="gallery-grid" id="galleryGrid">
            <!-- Images will be loaded here -->
        </div>
    </section>

    <!-- Generated Image Modal -->
    <div class="modal" id="imageModal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <img id="modalImage" src="" alt="Generated Image">
            <div class="modal-actions">
                <button class="download-btn">Download</button>
                <button class="share-btn">Share</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
