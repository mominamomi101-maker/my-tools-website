<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrammarCheck AI - Free Grammar Checker</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 1rem 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: #6366f1;
        }

        .logo i {
            font-size: 2rem;
            margin-right: 0.5rem;
        }

        .btn-upgrade {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-upgrade:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
        }

        .main-container {
            max-width: 1200px;
            margin: 2rem auto;
            display: flex;
            gap: 2rem;
            padding: 0 2rem;
        }

        .sidebar {
            width: 350px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .stats {
            margin-bottom: 2rem;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            margin-bottom: 1.5rem;
            padding: 1rem;
            background: linear-gradient(135deg, #f8fafc, #e2e8f0);
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: #10b981;
            margin-bottom: 0.25rem;
        }

        .stat-label {
            font-size: 0.875rem;
            color: #64748b;
        }

        .suggestions-panel h3 {
            margin-bottom: 1rem;
            color: #1e293b;
            display: flex;
            align-items: center;
        }

        .suggestions-panel h3 i {
            margin-right: 0.5rem;
            color: #f59e0b;
        }

        .suggestion-item {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .suggestion-item:hover {
            border-color: #6366f1;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
        }

        .editor-container {
            flex: 1;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            border-bottom: 1px solid #e2e8f0;
            background: rgba(255, 255, 255, 0.8);
        }

        .editor-tabs .tab {
            padding: 0.75rem 1.5rem;
            border: none;
            background: transparent;
            color: #64748b;
            font-weight: 500;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s ease;
            margin-right: 0.5rem;
        }

        .tab.active {
            color: #6366f1;
            border-bottom-color: #6366f1;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background: #f1f5f9;
            color: #475569;
        }

        .editor-wrapper {
            position: relative;
            height: 500px;
        }

        #editor {
            width: 100%;
            height: 100%;
            padding: 2rem;
            font-size: 1.1rem;
            line-height: 1.7;
            border: none;
            outline: none;
            resize: none;
            background: transparent;
            font-family: inherit;
        }

        .editor-footer {
            padding: 1rem 2rem;
            border-top: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            font-size: 0.875rem;
            color: #64748b;
            background: rgba(255, 255, 255, 0.8);
        }

        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
                padding: 0 1rem;
            }
            .sidebar {
                width: 100%;
                order: 2;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <i class="fas fa-check-circle"></i>
                <span>GrammarCheck AI</span>
            </div>
            <button class="btn-upgrade">Go Premium</button>
        </div>
    </header>

    <div class="main-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-number" id="correctness">100%</span>
                    <span class="stat-label">Correctness</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="clarity">100%</span>
                    <span class="stat-label">Clarity</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="engagement">100%</span>
                    <span class="stat-label">Engagement</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="delivery">100%</span>
                    <span class="stat-label">Delivery</span>
                </div>
            </div>
            <div class="suggestions-panel">
                <h3><i class="fas fa-lightbulb"></i> Suggestions</h3>
                <div id="suggestions-list">
                    <div style="text-align: center; color: #64748b; padding: 2rem;">
                        Start writing to see suggestions
                    </div>
                </div>
            </div>
        </aside>

        <!-- Editor -->
        <main class="editor-container">
            <div class="editor-header">
                <div class="editor-tabs">
                    <button class="tab active">Write</button>
                    <button class="tab">Check</button>
                </div>
                <div>
                    <button class="btn btn-primary" id="checkGrammar">
                        <i class="fas fa-spell-check"></i> Check Grammar
                    </button>
                    <button class="btn btn-secondary" id="clearText">
                        <i class="fas fa-trash"></i> Clear
                    </button>
                </div>
            </div>
            <div class="editor-wrapper">
                <textarea id="editor" placeholder="Start writing your text here... GrammarCheck AI will automatically analyze your writing for grammar, spelling, and style issues."></textarea>
            </div>
            <div class="editor-footer">
                <span id="wordCount">0 words</span>
                <span id="charCount">0 characters</span>
            </div>
        </main>
    </div>

    <script>
        // Grammar Engine
        const grammarErrors = {
            spelling: [
                { wrong: 'recieve', correct: 'receive' },
                { wrong: 'occured', correct: 'occurred' },
                { wrong: 'seperate', correct: 'separate' },
                { wrong: 'definately', correct: 'definitely' }
            ],
            grammar: [
                { pattern: /\b(he|she|it)( is| are)\b/gi, suggestion: 'Subject-verb agreement' },
                { pattern: /\bvery\b\s+(\w+)/gi, suggestion: 'Use stronger adjective' }
            ]
        };

        function analyzeText(text) {
            const issues = [];
            const lowerText = text.toLowerCase();

            // Spelling check
            grammarErrors.spelling.forEach(error => {
                const regex = new RegExp(`\\b${error.wrong}\\b`, 'gi');
                if (regex.test(text)) {
                    issues.push({
                        type: 'spelling',
                        message: `"${error.wrong}" → "${error.correct}"`,
                        preview: `"${error.wrong}" → "${error.correct}"`
                    });
                }
            });

            // Grammar check
            grammarErrors.grammar.forEach(rule => {
                if (rule.pattern.test(text)) {
                    issues.push({
                        type: 'grammar',
                        message: rule.suggestion,
                        preview: 'Review this sentence'
                    });
                }
            });

            const words = text.trim().split(/\s+/).filter(w => w.length > 0).length;
            return {
                issues,
                totalIssues: issues.length,
                wordCount: words,
                correctness: Math.max(0, 100 - issues.length * 8)
            };
        }

        // Elements
        const editor = document.getElementById('editor');
        const checkBtn = document.getElementById('checkGrammar');
        const clearBtn = document.getElementById('clearText');
        const suggestionsList = document.getElementById('suggestions-list');
        const wordCountEl = document.getElementById('wordCount');
        const charCountEl = document.getElementById('charCount');
        const stats = {
            correctness: document.getElementById('correctness'),
            clarity: document.getElementById('clarity'),
            engagement: document.getElementById('engagement'),
            delivery: document.getElementById('delivery')
        };

        // Real-time counters
        editor.addEventListener('input', updateCounters);
        function updateCounters() {
            const text = editor.value;
            const words = text.trim().split(/\s+/).filter(w => w.length > 0).length;
            const chars = text.length;
            wordCountEl.textContent = `${words} words`;
            charCountEl.textContent = `${chars} characters`;
        }

        // Check grammar
        checkBtn.addEventListener('click', () => {
            const text = editor.value;
            if (!text.trim()) return;

            const analysis = analyzeText(text);
            
            // Update stats
            stats.correctness.textContent = `${analysis.correctness}%`;
            stats.clarity.textContent = `${Math.max(85, 100 - analysis.totalIssues * 4)}%`;
            stats.engagement.textContent = `${Math.max(90, 100 - analysis.totalIssues * 3)}%`;
            stats.delivery.textContent = `${Math.max(88, 100 - analysis.totalIssues * 3.5)}%`;

            // Show suggestions
            if (analysis.issues.length === 0) {
                suggestionsList.innerHTML = '<div style="text-align: center; color: #10b981; padding: 2rem;"><i class="fas fa-check-circle" style="font-size: 2rem; margin-bottom: 1rem; display: block;"></i>Perfect! No issues found.</div>';
            } else {
                suggestionsList.innerHTML = analysis.issues.map(issue => `
                    <div class="suggestion-item" style="background: white;">
                        <div style="color: #1e293b; margin-bottom: 0.5rem;">${issue.message}</div>
                        <div style="font-size: 0.875rem; color: #64748b; background: #f8fafc; padding: 0.5rem; border-radius: 6px;">${issue.preview}</div>
                    </div>
                `).join('');
            }
        });

        // Clear text
        clearBtn.addEventListener('click', () => {
            editor.value = '';
            updateCounters();
            Object.values(stats).forEach(stat => stat.textContent = '100%');
            suggestionsList.innerHTML = '<div style="text-align: center; color: #64748b; padding: 2rem;">Start writing to see suggestions</div>';
        });

        // Auto-save
        editor.addEventListener('input', () => {
            localStorage.setItem('grammarcheck-draft', editor.value);
        });

        // Load draft
        window.addEventListener('load', () => {
            const draft = localStorage.getItem('grammarcheck-draft');
            if (draft) {
                editor.value = draft;
                updateCounters();
            }
        });

        // Keyboard shortcut (Ctrl+Enter)
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                checkBtn.click();
            }
        });
    </script>
</body>
</html>
