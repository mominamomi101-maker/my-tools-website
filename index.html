    <script>
        const coloringData = [
            { name: "Cute Cat", category: "animals", img: "https://www.supercoloring.com/sites/default/files/styles/coloring_medium/public/coloring/2023/11/cute-cat-coloring-page.png", pdf: "https://www.supercoloring.com/coloring-pages/cute-cat/download" },
            { name: "Lion", category: "animals", img: "https://www.supercoloring.com/sites/default/files/styles/coloring_medium/public/coloring/2024/01/lion-coloring-page.png", pdf: "https://www.supercoloring.com/coloring-pages/lion/download" },
            { name: "Elephant", category: "animals", img: "https://www.supercoloring.com/sites/default/files/styles/coloring_medium/public/coloring/2023/12/elephant-coloring-page.png", pdf: "https://www.supercoloring.com/coloring-pages/elephant/download" },
            { name: "Monkey", category: "animals", img: "https://www.supercoloring.com/sites/default/files/styles/coloring_medium/public/coloring/2024/01/monkey-coloring-page.png", pdf: "https://www.supercoloring.com/coloring-pages/monkey/download" },
            { name: "Rose", category: "flowers", img: "https://www.supercoloring.com/sites/default/files/styles/coloring_medium/public/coloring/2023/12/rose-coloring-page.png", pdf: "https://www.supercoloring.com/coloring-pages/rose/download" },
            { name: "Sunflower", category: "flowers", img: "https://www.supercoloring.com/sites/default/files/styles/coloring_medium/public/coloring/2024/01/sunflower-coloring-page.png", pdf: "https://www.supercoloring.com/coloring-pages/sunflower/download" },
            { name: "Race Car", category: "cars", img: "https://www.supercoloring.com/sites/default/files/styles/coloring_medium/public/coloring/2023/11/race-car-coloring-page.png", pdf: "https://www.supercoloring.com/coloring-pages/race-car/download" },
            { name: "Cute Unicorn", category: "unicorn", img: "https://www.supercoloring.com/sites/default/files/styles/coloring_medium/public/coloring/2024/01/cute-unicorn-coloring-page.png", pdf: "https://www.supercoloring.com/coloring-pages/cute-unicorn/download" },
            { name: "Beautiful Butterfly", category: "butterfly", img: "https://www.supercoloring.com/sites/default/files/styles/coloring_medium/public/coloring/2023/12/beautiful-butterfly-coloring-page.png", pdf: "https://www.supercoloring.com/coloring-pages/beautiful-butterfly/download" },
            { name: "Simple Mandala", category: "mandala", img: "https://www.supercoloring.com/sites/default/files/styles/coloring_medium/public/coloring/2024/01/simple-mandala-coloring-page.png", pdf: "https://www.supercoloring.com/coloring-pages/simple-mandala/download" },
            { name: "Cute Puppy", category: "animals", img: "https://www.supercoloring.com/sites/default/files/styles/coloring_medium/public/coloring/2024/01/cute-puppy-coloring-page.png", pdf: "https://www.supercoloring.com/coloring-pages/cute-puppy/download" },
            { name: "Teddy Bear", category: "animals", img: "https://www.supercoloring.com/sites/default/files/styles/coloring_medium/public/coloring/2023/11/teddy-bear-coloring-page.png", pdf: "https://www.supercoloring.com/coloring-pages/teddy-bear/download" }
        ];

        let currentCategory = "all";
        let currentSearch = "";

        function renderColoringPages() {
            let filtered = coloringData;
            if (currentCategory !== "all") {
                filtered = filtered.filter(item => item.category === currentCategory);
            }
            if (currentSearch !== "") {
                filtered = filtered.filter(item => item.name.toLowerCase().includes(currentSearch.toLowerCase()));
            }
            const grid = document.getElementById("coloringGrid");
            grid.innerHTML = filtered.map(item => `
                <div class="coloring-card">
                    <img src="${item.img}" alt="${item.name} coloring page" loading="lazy">
                    <div class="info">
                        <h3>${item.name}</h3>
                        <button onclick="openPDF('${item.pdf}')">📥 Download PDF</button>
                    </div>
                </div>
            `).join("");
        }

        function openPDF(pdfUrl) {
            const modal = document.getElementById("pdfModal");
            const frame = document.getElementById("pdfFrame");
            frame.src = pdfUrl;
            modal.style.display = "flex";
        }

        function closeModal() {
            const modal = document.getElementById("pdfModal");
            const frame = document.getElementById("pdfFrame");
            frame.src = "";
            modal.style.display = "none";
        }

        function toggleDarkMode() {
            document.body.classList.toggle("dark-mode");
        }

        document.querySelectorAll(".cat-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                currentCategory = btn.dataset.cat;
                renderColoringPages();
            });
        });

        document.getElementById("searchInput").addEventListener("input", (e) => {
            currentSearch = e.target.value;
            renderColoringPages();
        });

        renderColoringPages();
    </script>
