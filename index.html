<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FREE Tools - Thumbnail Downloader | QR Code</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px;}
        .container{max-width:1200px;margin:0 auto;}
        h1{text-align:center;color:white;margin-bottom:10px;font-size:2rem;}
        .subtitle{text-align:center;color:white;margin-bottom:40px;opacity:0.9;}
        .tools-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(350px,1fr));gap:25px;}
        .tool-card{background:white;border-radius:20px;padding:25px;box-shadow:0 10px 40px rgba(0,0,0,0.2);}
        .tool-card h2{color:#667eea;margin-bottom:20px;border-bottom:2px solid #667eea;padding-bottom:10px;}
        input,textarea,select{width:100%;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:10px;font-size:16px;}
        button{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border:none;padding:12px;border-radius:10px;cursor:pointer;width:100%;margin-top:10px;font-size:16px;}
        .result{margin-top:20px;padding:15px;background:#f5f5f5;border-radius:10px;}
        .ad-space{background:#f0f0f0;text-align:center;padding:20px;margin-top:30px;border-radius:10px;color:#666;}
        @media (max-width:768px){.tools-grid{grid-template-columns:1fr;} h1{font-size:1.5rem;}}
    </style>
</head>
<body>
    <div class="container">
        <h1>🛠️ FREE Utility Tools</h1>
        <div class="subtitle">No signup • 100% Free • Mobile friendly</div>
        <div class="tools-grid">
            <div class="tool-card">
                <h2>📸 YouTube Thumbnail Downloader</h2>
                <input type="text" id="youtubeUrl" placeholder="Paste YouTube URL here...">
                <button onclick="downloadThumbnail()">Get Thumbnail</button>
                <div id="thumbnailResult" class="result" style="display:none;"></div>
            </div>
            <div class="tool-card">
                <h2>📱 QR Code Generator</h2>
                <input type="text" id="qrText" placeholder="Enter text or URL...">
                <button onclick="generateQR()">Generate QR Code</button>
                <div id="qrResult" class="result" style="display:none;"></div>
            </div>
            <div class="tool-card">
                <h2>🔊 Text to Speech</h2>
                <textarea id="ttsText" rows="3" placeholder="Type something to speak..."></textarea>
                <select id="voiceSelect"><option value="en-US">English</option><option value="hi-IN">Hindi</option></select>
                <button onclick="speakText()">🔊 Speak</button>
            </div>
            <div class="tool-card">
                <h2>🗜️ Image Compressor</h2>
                <input type="file" id="imageInput" accept="image/*">
                <button onclick="compressImage()">Compress Image</button>
                <div id="imageResult" class="result" style="display:none;"></div>
            </div>
        </div>
        <div class="ad-space">📢 Google AdSense will appear here once approved<br>(Place your ad code here)</div>
    </div>
    <script>
        function downloadThumbnail(){let u=document.getElementById('youtubeUrl').value;let v='';let p=[/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&]+)/,/youtube\.com\/embed\/([^?]+)/];for(let r of p){let m=u.match(r);if(m){v=m[1];break}}if(v){let t=`https://img.youtube.com/vi/${v}/maxresdefault.jpg`;let d=document.getElementById('thumbnailResult');d.style.display='block';d.innerHTML=`<img src="${t}" style="width:100%;border-radius:10px;"><a href="${t}" download style="display:inline-block;margin-top:10px;color:#667eea;">📥 Download</a>`}else{alert('Invalid YouTube URL!')}}
        function generateQR(){let t=document.getElementById('qrText').value;if(t){let q=`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(t)}`;let d=document.getElementById('qrResult');d.style.display='block';d.innerHTML=`<img src="${q}" style="width:100%;max-width:200px;margin:0 auto;display:block;"><p style="text-align:center;margin-top:10px;">Scan this QR Code</p>`}else{alert('Please enter text or URL!')}}
        function speakText(){let t=document.getElementById('ttsText').value;let l=document.getElementById('voiceSelect').value;if(t){let u=new SpeechSynthesisUtterance(t);u.lang=l;speechSynthesis.speak(u)}else{alert('Please type something!')}}
        function compressImage(){let f=document.getElementById('imageInput').files[0];if(f){let r=new FileReader();r.onload=function(e){let i=new Image();i.onload=function(){let c=document.createElement('canvas');let x=c.getContext('2d');c.width=i.width;c.height=i.height;x.drawImage(i,0,0);let d=c.toDataURL('image/jpeg',0.5);let res=document.getElementById('imageResult');res.style.display='block';res.innerHTML=`<img src="${d}" style="width:100%;border-radius:10px;"><a href="${d}" download="compressed.jpg" style="display:inline-block;margin-top:10px;color:#667eea;">📥 Download</a><p style="font-size:12px;">✅ Compressed</p>`};i.src=e.target.result};r.readAsDataURL(f)}else{alert('Select an image!')}}
    </script>
</body>
</html>
