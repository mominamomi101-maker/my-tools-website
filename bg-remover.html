<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Remover - Free Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        h1 {
            font-size: 28px;
            color: #333;
            text-align: center;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .upload-area {
            background: #f8f9ff;
            border: 2px dashed #764ba2;
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            border-color: #667eea;
            background: #f0f2ff;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #333;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .upload-hint {
            color: #888;
            font-size: 13px;
        }

        #fileInput {
            display: none;
        }

        .preview-area {
            display: none;
            gap: 15px;
            margin: 20px 0;
        }

        .preview-box {
            flex: 1;
            background: #f5f5f5;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
        }

        .preview-label {
            font-size: 12px;
            font-weight: 600;
            color: #666;
            margin-bottom: 10px;
        }

        .image-container {
            background: repeating-conic-gradient(#ddd 0% 25%, #eee 0% 50%) 50% / 16px 16px;
            border-radius: 10px;
            min-height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-container img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
        }

        .progress-container {
            display: none;
            margin: 20px 0;
        }

        .progress-bar {
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s;
        }

        .progress-text {
            font-size: 12px;
            color: #666;
            margin-top: 8px;
            text-align: center;
        }

        .status {
            padding: 12px;
            border-radius: 10px;
            margin: 15px 0;
            font-size: 14px;
            display: none;
        }

        .status.info {
            background: #e3f2fd;
            color: #1565c0;
            display: block;
        }

        .status.success {
            background: #e8f5e9;
            color: #2e7d32;
            display: block;
        }

        .status.error {
            background: #ffebee;
            color: #c62828;
            display: block;
        }

        .btn {
            padding: 14px 24px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 16px;
            border: none;
            cursor: pointer;
            width: 100%;
            margin: 8px 0;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-success {
            background: #4caf50;
            color: white;
            display: none;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #764ba2;
            color: #764ba2;
            display: none;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .sample-section {
            margin-top: 20px;
            text-align: center;
        }

        .sample-text {
            color: #666;
            font-size: 13px;
            margin-bottom: 10px;
        }

        .sample-imgs {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .sample-img {
            width: 60px;
            height: 60px;
            border-radius: 10px;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }

        .sample-img:hover {
            border-color: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Background Remover</h1>
        <p class="subtitle">Remove background instantly with AI • 100% Free • No Signup</p>

        <!-- Upload Area -->
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📸</div>
            <div class="upload-text">Click to Upload or Drag & Drop</div>
            <div class="upload-hint">PNG, JPG, JPEG • Max 25MB</div>
        </div>
        <input type="file" id="fileInput" accept="image/png, image/jpeg, image/jpg">

        <!-- Preview Area -->
        <div class="preview-area" id="previewArea">
            <div class="preview-box">
                <div class="preview-label">ORIGINAL</div>
                <div class="image-container">
                    <img id="originalImg" alt="Original">
                </div>
            </div>
            <div class="preview-box">
                <div class="preview-label">RESULT</div>
                <div class="image-container">
                    <img id="resultImg" alt="Result">
                </div>
            </div>
        </div>

        <!-- Progress -->
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">Downloading AI model...</div>
        </div>

        <!-- Status -->
        <div class="status" id="statusMessage"></div>

        <!-- Sample Images -->
        <div class="sample-section" id="sampleSection">
            <p class="sample-text">Try with sample images:</p>
            <div class="sample-imgs">
                <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=100&h=100&fit=crop" class="sample-img" alt="Sample">
                <img src="https://images.unsplash.com/photo-1494790108755-2612896aaf42?w=100&h=100&fit=crop" class="sample-img" alt="Sample">
                <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=100&h=100&fit=crop" class="sample-img" alt="Sample">
            </div>
        </div>

        <!-- Buttons -->
        <button class="btn btn-primary" id="removeBtn" disabled>🎯 Remove Background</button>
        <button class="btn btn-success" id="downloadBtn">⬇ Download PNG</button>
        <button class="btn btn-outline" id="newBtn">📷 New Image</button>

        <a href="index.html" class="back-link">← Back to Tools</a>
    </div>

    <!-- IMPORTANT: Load library from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.1.1/dist/index.umd.min.js"></script>

    <script>
        (function() {
            // Check if library is loaded
            if (typeof window.removeBackground === 'undefined') {
                document.getElementById('statusMessage').textContent = '⚠️ AI model loading... Please wait or refresh.';
                document.getElementById('statusMessage').className = 'status info';
                
                // Retry after 2 seconds
                setTimeout(() => {
                    if (typeof window.removeBackground === 'undefined') {
                        document.getElementById('statusMessage').textContent = '❌ Failed to load AI model. Check your internet connection.';
                        document.getElementById('statusMessage').className = 'status error';
                    }
                }, 3000);
                return;
            }

            const removeBackground = window.removeBackground;

            // DOM Elements
            const uploadArea = document.getElementById('uploadArea');
            const fileInput = document.getElementById('fileInput');
            const previewArea = document.getElementById('previewArea');
            const originalImg = document.getElementById('originalImg');
            const resultImg = document.getElementById('resultImg');
            const removeBtn = document.getElementById('removeBtn');
            const downloadBtn = document.getElementById('downloadBtn');
            const newBtn = document.getElementById('newBtn');
            const progressContainer = document.getElementById('progressContainer');
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            const statusMessage = document.getElementById('statusMessage');
            const sampleSection = document.getElementById('sampleSection');
            const sampleImgs = document.querySelectorAll('.sample-img');

            let selectedFile = null;
            let resultBlob = null;

            // Show status
            function showStatus(text, type) {
                statusMessage.textContent = text;
                statusMessage.className = `status ${type}`;
            }

            // Hide sample section when image loaded
            function hideSampleSection() {
                sampleSection.style.display = 'none';
            }

            function showSampleSection() {
                sampleSection.style.display = 'block';
            }

            // Load image from file
            function loadImage(file) {
                if (file.size > 25 * 1024 * 1024) {
                    showStatus('❌ File too large! Max 25MB', 'error');
                    return;
                }

                selectedFile = file;
                const reader = new FileReader();
                reader.onload = (e) => {
                    originalImg.src = e.target.result;
                    previewArea.style.display = 'flex';
                    resultImg.src = '';
                    removeBtn.disabled = false;
                    downloadBtn.style.display = 'none';
                    newBtn.style.display = 'none';
                    hideSampleSection();
                    showStatus('✅ Image loaded. Click "Remove Background"', 'success');
                };
                reader.readAsDataURL(file);
            }

            // Upload handlers
            uploadArea.addEventListener('click', () => fileInput.click());

            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.style.borderColor = '#667eea';
                uploadArea.style.background = '#f0f2ff';
            });

            uploadArea.addEventListener('dragleave', () => {
                uploadArea.style.borderColor = '#764ba2';
                uploadArea.style.background = '#f8f9ff';
            });

            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.style.borderColor = '#764ba2';
                uploadArea.style.background = '#f8f9ff';
                const file = e.dataTransfer.files[0];
                if (file && file.type.startsWith('image/')) {
                    loadImage(file);
                } else {
                    showStatus('❌ Please select an image file', 'error');
                }
            });

            fileInput.addEventListener('change', (e) => {
                if (e.target.files[0]) {
                    loadImage(e.target.files[0]);
                }
            });

            // Sample images
            sampleImgs.forEach(img => {
                img.addEventListener('click', async () => {
                    try {
                        showStatus('Loading sample image...', 'info');
                        const response = await fetch(img.src.replace('100&h=100', '400&h=400'));
                        const blob = await response.blob();
                        loadImage(blob);
                    } catch (error) {
                        showStatus('❌ Failed to load sample', 'error');
                    }
                });
            });

            // Remove Background
            removeBtn.addEventListener('click', async () => {
                if (!selectedFile) return;

                removeBtn.disabled = true;
                removeBtn.textContent = '⏳ Processing...';
                progressContainer.style.display = 'block';
                progressFill.style.width = '10%';
                progressText.textContent = 'Loading AI model...';
                showStatus('🤖 AI is analyzing image...', 'info');

                try {
                    const blob = await removeBackground(selectedFile, {
                        progress: (key, current, total) => {
                            const percent = Math.round((current / total) * 100);
                            progressFill.style.width = Math.min(30 + percent * 0.6, 90) + '%';
                            progressText.textContent = `Processing: ${percent}%`;
                        },
                        model: 'medium'
                    });

                    progressFill.style.width = '100%';
                    progressText.textContent = '✅ Complete!';

                    resultBlob = blob;
                    resultImg.src = URL.createObjectURL(blob);
                    downloadBtn.style.display = 'block';
                    newBtn.style.display = 'block';
                    showStatus('🎉 Background removed successfully!', 'success');

                    setTimeout(() => {
                        progressContainer.style.display = 'none';
                    }, 1000);

                } catch (error) {
                    console.error('Error:', error);
                    showStatus('❌ Error: ' + error.message, 'error');
                    progressContainer.style.display = 'none';
                } finally {
                    removeBtn.textContent = '🎯 Remove Background';
                    removeBtn.disabled = false;
                }
            });

            // Download
            downloadBtn.addEventListener('click', () => {
                if (resultBlob) {
                    const url = URL.createObjectURL(resultBlob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'no-background.png';
                    a.click();
                    URL.revokeObjectURL(url);
                    showStatus('📥 Downloaded!', 'success');
                }
            });

            // New Image
            newBtn.addEventListener('click', () => {
                previewArea.style.display = 'none';
                removeBtn.disabled = true;
                downloadBtn.style.display = 'none';
                newBtn.style.display = 'none';
                progressContainer.style.display = 'none';
                fileInput.value = '';
                selectedFile = null;
                resultBlob = null;
                showSampleSection();
                showStatus('', 'info');
            });

            // Paste support
            document.addEventListener('paste', (e) => {
                const items = e.clipboardData.items;
                for (let item of items) {
                    if (item.type.startsWith('image/')) {
                        const file = item.getAsFile();
                        loadImage(file);
                        break;
                    }
                }
            });

            showStatus('✨ Ready! Upload an image to start.', 'info');
        })();
    </script>
</body>
            </html>
