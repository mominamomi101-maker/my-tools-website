<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Remover - Free AI Tool</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            padding: 16px;
        }
        .box {
            background: white;
            border-radius: 24px;
            padding: 24px 20px;
            max-width: 500px;
            margin: 0 auto;
        }
        h1 { font-size: 24px; text-align: center; margin-bottom: 8px; }
        p { text-align: center; color: #666; margin-bottom: 20px; font-size: 14px; }
        .upload-box {
            background: #f5f5f5;
            border: 2px dashed #764ba2;
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            margin: 20px 0;
        }
        .upload-box span { font-size: 40px; display: block; margin-bottom: 10px; }
        input { display: none; }
        .preview { display: flex; gap: 10px; margin: 20px 0; }
        .img-box {
            flex: 1;
            background: #eee;
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            min-height: 150px;
            background-image: repeating-conic-gradient(#ccc 0% 25%, #ddd 0% 50%);
            background-size: 20px 20px;
        }
        .img-box img { max-width: 100%; max-height: 150px; border-radius: 8px; }
        .label { font-size: 11px; color: #888; margin-bottom: 5px; }
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            margin: 8px 0;
            cursor: pointer;
        }
        .btn-purple {
            background: #764ba2;
            color: white;
        }
        .btn-purple:disabled {
            opacity: 0.5;
        }
        .btn-green {
            background: #4caf50;
            color: white;
            display: none;
        }
        .btn-gray {
            background: #ddd;
            color: #333;
            display: none;
        }
        .progress {
            height: 6px;
            background: #ddd;
            border-radius: 10px;
            margin: 15px 0;
            display: none;
        }
        .progress-bar {
            height: 100%;
            background: #764ba2;
            width: 0%;
            border-radius: 10px;
        }
        #status {
            text-align: center;
            font-size: 13px;
            padding: 10px;
        }
        .back {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="box">
    <h1>🎨 Background Remover</h1>
    <p>Tap to upload • AI auto remove • Free</p>
    
    <div class="upload-box" id="uploadBox">
        <span>📸</span>
        <strong>Tap to Select Image</strong>
        <div style="font-size:12px;color:#999;margin-top:8px;">PNG, JPG up to 25MB</div>
    </div>
    <input type="file" id="fileInput" accept="image/*">
    
    <div class="preview" id="previewArea" style="display:none;">
        <div style="flex:1;">
            <div class="label">ORIGINAL</div>
            <div class="img-box"><img id="originalImg"></div>
        </div>
        <div style="flex:1;">
            <div class="label">RESULT</div>
            <div class="img-box"><img id="resultImg"></div>
        </div>
    </div>
    
    <div class="progress" id="progressDiv">
        <div class="progress-bar" id="progressBar"></div>
    </div>
    
    <div id="status"></div>
    
    <button class="btn btn-purple" id="removeBtn" disabled>🤖 Remove Background</button>
    <button class="btn btn-green" id="downloadBtn">⬇ Download</button>
    <button class="btn btn-gray" id="newBtn">📷 New Image</button>
    
    <a href="index.html" class="back">← Back to Tools</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.1.1/dist/index.umd.min.js"></script>

<script>
(function(){
    if(typeof window.removeBackground === 'undefined') {
        document.getElementById('status').innerHTML = '❌ Loading... Please wait';
        setTimeout(function(){ location.reload(); }, 2000);
        return;
    }
    
    const removeBG = window.removeBackground;
    let file = null, result = null;
    const uploadBox = document.getElementById('uploadBox');
    const fileInput = document.getElementById('fileInput');
    const previewArea = document.getElementById('previewArea');
    const originalImg = document.getElementById('originalImg');
    const resultImg = document.getElementById('resultImg');
    const removeBtn = document.getElementById('removeBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const newBtn = document.getElementById('newBtn');
    const progressDiv = document.getElementById('progressDiv');
    const progressBar = document.getElementById('progressBar');
    const status = document.getElementById('status');
    
    uploadBox.onclick = () => fileInput.click();
    
    fileInput.onchange = (e) => {
        if(e.target.files[0]) {
            file = e.target.files[0];
            originalImg.src = URL.createObjectURL(file);
            previewArea.style.display = 'flex';
            removeBtn.disabled = false;
            downloadBtn.style.display = 'none';
            newBtn.style.display = 'none';
            resultImg.src = '';
            status.innerHTML = '✅ Ready! Tap Remove';
        }
    };
    
    removeBtn.onclick = async () => {
        if(!file) return;
        removeBtn.disabled = true;
        removeBtn.textContent = '⏳ Processing...';
        progressDiv.style.display = 'block';
        status.innerHTML = '🤖 AI working...';
        
        try {
            result = await removeBG(file, {
                model: 'medium',
                progress: (k, c, t) => {
                    progressBar.style.width = Math.round(c/t*100) + '%';
                }
            });
            resultImg.src = URL.createObjectURL(result);
            downloadBtn.style.display = 'block';
            newBtn.style.display = 'block';
            status.innerHTML = '🎉 Done! Tap Download';
        } catch(e) {
            status.innerHTML = '❌ Error: ' + e.message;
        } finally {
            removeBtn.textContent = '🤖 Remove Background';
            removeBtn.disabled = false;
            progressDiv.style.display = 'none';
        }
    };
    
    downloadBtn.onclick = () => {
        if(result) {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(result);
            a.download = 'no-bg.png';
            a.click();
        }
    };
    
    newBtn.onclick = () => {
        previewArea.style.display = 'none';
        removeBtn.disabled = true;
        downloadBtn.style.display = 'none';
        newBtn.style.display = 'none';
        fileInput.value = '';
        file = null;
        status.innerHTML = '';
    };
    
    status.innerHTML = '✨ Ready! Tap upload box';
})();
</script>
</body>
</html>
